<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập Trắc nghiệm Kiểm thử phần mềm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a1a; line-height: 1.6; }

.page-wrap { max-width: 820px; margin: 0 auto; padding: 28px 20px 80px; }

.hero {
  text-align: center;
  padding: 2rem 1rem 1.75rem;
  background: #ffffff;
  border: 1px solid #e2e4e8;
  border-radius: 14px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.hero-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #534AB7, #1D9E75, #185FA5);
}
.hero h1 { font-size: 20px; font-weight: 600; color: #0d1b2a; margin-bottom: 5px; }
.hero p { font-size: 13px; color: #6b7280; }
.hero-icon { color: #534AB7; font-size: 20px; vertical-align: -2px; margin-right: 7px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.stat-card { background: #ffffff; border: 1px solid #e2e4e8; border-radius: 10px; padding: 14px 16px; }
.stat-card .s-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
.stat-card .s-value { font-size: 22px; font-weight: 600; }
.stat-card .s-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.stat-card.blue .s-value { color: #185FA5; }
.stat-card.teal .s-value { color: #0F6E56; }
.stat-card.purple .s-value { color: #534AB7; }

.progress-wrap {
  background: #ffffff; border: 1px solid #e2e4e8; border-radius: 10px;
  padding: 12px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 10px; z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.prog-label { font-size: 12px; color: #6b7280; white-space: nowrap; }
.prog-bar { flex: 1; height: 6px; background: #f4f5f7; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: #534AB7; transition: width 0.35s ease; width: 0%; }
.prog-pct { font-size: 12px; font-weight: 600; color: #534AB7; min-width: 32px; text-align: right; }
.prog-score { font-size: 12px; color: #6b7280; border-left: 1px solid #e2e4e8; padding-left: 12px; white-space: nowrap; }
.prog-score span { font-weight: 600; color: #0d1b2a; }

.section-label {
  font-size: 11px; font-weight: 600; color: #9ca3af;
  text-transform: uppercase; letter-spacing: 0.7px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.section-dot { width: 6px; height: 6px; border-radius: 50%; background: #534AB7; flex-shrink: 0; }

.q-card {
  background: #ffffff; border: 1px solid #e2e4e8;
  border-radius: 12px; padding: 18px 20px;
  margin-bottom: 10px; transition: border-color 0.2s, box-shadow 0.2s;
}
.q-card:hover { border-color: #c5cad3; }
.q-card.answered { border-color: #AFA9EC; }

.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.q-num { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.6px; }
.q-tag {
  font-size: 10px; font-weight: 600; padding: 2px 9px;
  border-radius: 99px; background: #EEEDFE; color: #3C3489;
  letter-spacing: 0.2px;
}
.q-text { font-size: 14px; font-weight: 500; color: #0d1b2a; line-height: 1.6; margin-bottom: 12px; }

.opts { display: flex; flex-direction: column; gap: 6px; }
.opt-label {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border: 1px solid #e2e4e8;
  border-radius: 8px; cursor: pointer; font-size: 13px;
  color: #1a1a1a; transition: all 0.15s; user-select: none;
}
.opt-label:hover { background: #f8f9fb; border-color: #c5cad3; }
.opt-label input[type=radio] { display: none; }

.opt-radio {
  width: 15px; height: 15px; border-radius: 50%;
  border: 1.5px solid #c5cad3; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.opt-radio-dot { width: 6px; height: 6px; border-radius: 50%; background: white; display: none; }

.opt-label.sel { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; }
.opt-label.sel .opt-radio { background: #534AB7; border-color: #534AB7; }
.opt-label.sel .opt-radio-dot { display: block; }
.opt-label.sel .opt-key { color: #534AB7; }

.opt-label.correct { background: #E1F5EE; border-color: #5DCAA5; color: #085041; font-weight: 500; }
.opt-label.correct .opt-radio { background: #1D9E75; border-color: #1D9E75; }
.opt-label.correct .opt-radio-dot { display: block; }
.opt-label.correct .opt-key { color: #0F6E56; }

.opt-label.incorrect { background: #FCEBEB; border-color: #F09595; color: #791F1F; text-decoration: line-through; }
.opt-label.incorrect .opt-radio { border-color: #E24B4A; }

.opt-key { font-size: 11px; font-weight: 600; min-width: 18px; color: #9ca3af; transition: color 0.15s; }

.controls {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 1.5rem; padding-top: 1.25rem;
  border-top: 1px solid #e2e4e8; gap: 10px; flex-wrap: wrap;
}
.result-badge {
  display: none; align-items: center; gap: 8px;
  background: #EEEDFE; border: 1px solid #AFA9EC;
  border-radius: 8px; padding: 9px 14px;
  font-size: 13px; color: #26215C;
}
.result-badge i { color: #534AB7; font-size: 15px; }
.result-badge .sc { font-size: 15px; font-weight: 700; color: #534AB7; }

.btn-submit {
  display: inline-flex; align-items: center; gap: 6px;
  background: #534AB7; color: #fff; border: none;
  border-radius: 8px; padding: 10px 22px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.2s;
}
.btn-submit:hover { background: #3C3489; }
.btn-retry {
  display: none; align-items: center; gap: 6px;
  background: #ffffff; color: #0d1b2a;
  border: 1px solid #c5cad3; border-radius: 8px;
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: background 0.2s;
}
.btn-retry:hover { background: #f4f5f7; }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="hero">
    <div class="hero-accent"></div>
    <h1><i class="ti ti-shield-check hero-icon"></i>Kiểm thử phần mềm</h1>
    <p>Ngân hàng 100 câu · Bốc ngẫu nhiên 35 câu mỗi lần · Thang điểm 7.0</p>
  </div>

  <div class="stats-row">
    <div class="stat-card blue">
      <div class="s-label"><i class="ti ti-list-numbers" style="font-size:12px"></i> Tổng câu</div>
      <div class="s-value" id="total-q">35</div>
      <div class="s-sub">câu hỏi</div>
    </div>
    <div class="stat-card teal">
      <div class="s-label"><i class="ti ti-pencil" style="font-size:12px"></i> Đã làm</div>
      <div class="s-value" id="done-val">0</div>
      <div class="s-sub">/ <span id="total-q2">35</span> câu</div>
    </div>
    <div class="stat-card purple">
      <div class="s-label"><i class="ti ti-award" style="font-size:12px"></i> Điểm</div>
      <div class="s-value" id="score-val">--</div>
      <div class="s-sub">/ 7.0</div>
    </div>
  </div>

  <div class="progress-wrap">
    <span class="prog-label"><i class="ti ti-chart-bar" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Tiến độ</span>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    <span class="prog-pct" id="prog-pct">0%</span>
    <div class="prog-score">Điểm: <span id="score-display">-- / 7.0</span></div>
  </div>

  <div class="section-label"><span class="section-dot"></span> Câu hỏi</div>

  <div id="quiz-container"></div>

  <div class="controls">
    <div class="result-badge" id="result-badge">
      <i class="ti ti-star"></i>
      Đúng <span class="sc" id="correct-count">0</span>/35 câu &nbsp;·&nbsp; Điểm: <span class="sc" id="final-score">0.00</span> / 7.0
    </div>
    <div style="display:flex;gap:8px;margin-left:auto">
      <button class="btn-retry" id="btn-retry" onclick="retryQuiz()">
        <i class="ti ti-refresh" style="font-size:14px"></i> Làm đề mới
      </button>
      <button class="btn-submit" id="btn-submit" onclick="submitQuiz()">
        <i class="ti ti-send" style="font-size:14px"></i> Nộp bài &amp; Xem điểm
      </button>
    </div>
  </div>

</div>

<script src="questions.js"></script>
<script>
const TOTAL = 35;
const PPQ = 7.0 / TOTAL;
const TAGS = [
  '7 nguyên tắc','7 nguyên tắc','7 nguyên tắc','7 nguyên tắc','7 nguyên tắc',
  '7 nguyên tắc','7 nguyên tắc','7 nguyên tắc','7 nguyên tắc','7 nguyên tắc',
  '7 nguyên tắc','7 nguyên tắc','7 nguyên tắc','7 nguyên tắc','7 nguyên tắc',
  'Static Testing','Tổng quan',
  'Mức độ KT','Mức độ KT','Mức độ KT','Mức độ KT','Mức độ KT','Mức độ KT',
  'Mức độ KT','Non-functional','Mức độ KT','V-Model','V-Model','V-Model',
  'Agile','Regression','Môi trường','Review','Review','Test Plan',
  'Hộp đen','EP & BVA','BVA','BVA','BVA','EP','BVA','Decision Table',
  'Decision Table','Decision Table','State Transition','Pairwise',
  'Use Case','Error Guessing','Exploratory','Gray-box','EP & BVA','Decision Table',
  'Hộp trắng','Coverage','Coverage','McCabe','McCabe','McCabe',
  'Statement','Statement','Branch','Branch','Branch','Vòng lặp',
  'Vòng lặp','Mutation','Hộp trắng','Hộp trắng',
  'JUnit 5','JUnit 5','JUnit 5','JUnit 5','JUnit 5','JUnit 5','JUnit 5',
  'JUnit 5','JUnit 5','JUnit 5','JUnit 5','JUnit 5','Automation','Automation','Automation',
  'Bugzilla','Bugzilla','Bugzilla','Bugzilla','Bugzilla','Bugzilla','Bugzilla',
  'Bugzilla','Bugzilla','Selenium IDE','Selenium IDE','Selenium','Selenium','Selenium','Selenium','Selenium'
];

let questions = [], isSubmitted = false, answeredCount = 0;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuiz() {
  if (typeof fullQuestionBank === 'undefined') {
    document.getElementById('quiz-container').innerHTML =
      '<div style="padding:2rem;text-align:center;color:#791F1F;background:#FCEBEB;border-radius:12px;border:1px solid #F09595;font-size:14px">' +
      '<i class="ti ti-alert-circle" style="font-size:24px;display:block;margin-bottom:10px"></i>' +
      'Không tìm thấy file <code>questions.js</code>.<br>Đảm bảo 2 file cùng thư mục và mở bằng Live Server.</div>';
    return;
  }
  isSubmitted = false;
  answeredCount = 0;
  questions = shuffle(fullQuestionBank).slice(0, TOTAL);
  document.getElementById('total-q').textContent = TOTAL;
  document.getElementById('total-q2').textContent = TOTAL;
  document.getElementById('done-val').textContent = '0';
  document.getElementById('score-val').textContent = '--';
  document.getElementById('score-display').textContent = '-- / 7.0';
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('prog-pct').textContent = '0%';
  document.getElementById('btn-submit').style.display = 'inline-flex';
  document.getElementById('btn-retry').style.display = 'none';
  document.getElementById('result-badge').style.display = 'none';
  renderQuiz();
}

function getTag(qObj) {
  const idx = typeof fullQuestionBank !== 'undefined'
    ? fullQuestionBank.indexOf(qObj) : -1;
  return (idx >= 0 && TAGS[idx]) ? TAGS[idx] : 'Kiểm thử';
}

function renderQuiz() {
  const c = document.getElementById('quiz-container');
  c.innerHTML = '';
  const keys = ['A','B','C','D'];
  questions.forEach((q, i) => {
    let html = `<div class="q-card" id="qcard-${i}">
      <div class="q-meta">
        <span class="q-num">Câu ${i + 1} / ${TOTAL}</span>
        <span class="q-tag">${getTag(q)}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="opts">`;
    q.opts.forEach((opt, j) => {
      html += `<label class="opt-label" id="lbl-${i}-${j}" onclick="pickOpt(${i},${j})">
        <input type="radio" name="q${i}" value="${j}">
        <div class="opt-radio"><div class="opt-radio-dot"></div></div>
        <span class="opt-key">${keys[j]}.</span>
        ${opt}
      </label>`;
    });
    html += `</div></div>`;
    c.innerHTML += html;
  });
  window.scrollTo(0, 0);
}

function pickOpt(qi, oi) {
  if (isSubmitted) return;
  const card = document.getElementById(`qcard-${qi}`);
  const opts = card.querySelectorAll('.opt-label');
  const wasAnswered = card.classList.contains('answered');
  opts.forEach(o => o.classList.remove('sel'));
  document.getElementById(`lbl-${qi}-${oi}`).classList.add('sel');
  document.querySelector(`input[name="q${qi}"][value="${oi}"]`).checked = true;
  if (!wasAnswered) {
    card.classList.add('answered');
    answeredCount++;
    updateProgress();
  }
}

function updateProgress() {
  const pct = Math.round((answeredCount / TOTAL) * 100);
  document.getElementById('done-val').textContent = answeredCount;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function submitQuiz() {
  if (isSubmitted) return;
  let correct = 0, unanswered = 0;
  questions.forEach((q, i) => {
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    const correctLbl = document.getElementById(`lbl-${i}-${q.ans}`);
    correctLbl.classList.add('correct');
    if (sel) {
      const v = parseInt(sel.value);
      if (v === q.ans) correct++;
      else document.getElementById(`lbl-${i}-${v}`).classList.add('incorrect');
    } else unanswered++;
  });
  if (unanswered > 0) {
    if (!confirm(`Bạn còn ${unanswered} câu chưa làm. Có chắc muốn nộp bài?`)) {
      document.querySelectorAll('.opt-label').forEach(l => l.classList.remove('correct','incorrect'));
      return;
    }
  }
  isSubmitted = true;
  document.querySelectorAll('input[type=radio]').forEach(r => r.disabled = true);
  const score = (correct * PPQ).toFixed(2);
  document.getElementById('score-val').textContent = score;
  document.getElementById('score-display').textContent = `${score} / 7.0`;
  document.getElementById('correct-count').textContent = correct;
  document.getElementById('final-score').textContent = score;
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-retry').style.display = 'inline-flex';
  document.getElementById('result-badge').style.display = 'flex';
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-pct').textContent = '100%';
  window.scrollTo(0, 0);
}

function retryQuiz() { initQuiz(); }
window.onload = initQuiz;
</script>
</body>
</html>
